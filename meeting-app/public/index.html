<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم اشتراک‌گذاری جلسات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online { background: #2ecc71; }
        .status-dot.offline { background: #e74c3c; }

        .form-card {
            background: white;
            border-radius: 15px;
            padding: 25px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background: #fafafa;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            background: white;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .form-group.full-width { grid-column: 1 / -1; }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52,152,219,0.3);
        }

        .btn-success {
            background: #2ecc71;
            color: white;
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #e67e22;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            padding: 6px 14px;
            font-size: 12px;
        }

        .btn-danger:hover { background: #c0392b; }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .meetings-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .meeting-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.3s;
            border-right: 5px solid #3498db;
        }

        .meeting-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        .meeting-card .edit-mode { display: none; }
        .meeting-card.editing .view-mode { display: none; }
        .meeting-card.editing .edit-mode { display: block; }

        .meeting-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .meeting-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
        }

        .meeting-date {
            font-size: 13px;
            color: #7f8c8d;
            background: #f0f0f0;
            padding: 3px 12px;
            border-radius: 15px;
            white-space: nowrap;
        }

        .meeting-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            font-size: 13px;
            color: #555;
        }

        .meeting-meta .badge {
            background: #3498db;
            color: white;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
        }

        .meeting-summary {
            color: #444;
            font-size: 14px;
            line-height: 1.6;
            margin: 10px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .meeting-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            flex-wrap: wrap;
            gap: 8px;
        }

        .meeting-attendees {
            font-size: 12px;
            color: #7f8c8d;
        }

        .meeting-attendees strong { color: #2c3e50; }

        .btn-group {
            display: flex;
            gap: 5px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }

        .edit-input {
            width: 100%;
            padding: 8px;
            border: 2px solid #3498db;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .edit-textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid #3498db;
            border-radius: 8px;
            min-height: 60px;
            margin-bottom: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .online-users {
            font-size: 13px;
            color: #7f8c8d;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: 1; }
            .form-actions { grid-column: 1; flex-direction: column; }
            .meetings-list { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 سیستم اشتراک‌گذاری جلسات</h1>
            <div class="status">
                <span class="online-users" id="onlineUsers">👥 ۰ کاربر آنلاین</span>
                <span class="status-dot online" id="statusDot"></span>
                <span id="statusText" style="font-size:13px;">اتصال...</span>
            </div>
        </div>

        <div class="form-card">
            <h3 style="margin-bottom:20px;color:#2c3e50;">✏️ ثبت جلسه جدید</h3>
            <form id="meetingForm" class="form-grid">
                <div class="form-group">
                    <label>📌 موضوع جلسه</label>
                    <input type="text" id="title" placeholder="مثلاً: جلسه برنامه‌ریزی" required>
                </div>
                <div class="form-group">
                    <label>📅 تاریخ و زمان</label>
                    <input type="datetime-local" id="date" required>
                </div>
                <div class="form-group full-width">
                    <label>📝 خلاصه جلسه</label>
                    <textarea id="summary" placeholder="خلاصه مباحث، تصمیمات..." required></textarea>
                </div>
                <div class="form-group">
                    <label>👥 افراد حاضر</label>
                    <input type="text" id="attendees" placeholder="علی، مریم، رضا">
                </div>
                <div class="form-group">
                    <label>📍 مکان</label>
                    <input type="text" id="location" placeholder="سالن جلسات یا آنلاین">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">➕ ثبت جلسه</button>
                    <button type="reset" class="btn" style="background:#ecf0f1;color:#2c3e50;">🗑️ پاک کردن</button>
                </div>
            </form>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;">
            <h2 style="color:#2c3e50;font-size:20px;">📂 جلسات ثبت شده</h2>
            <span style="font-size:13px;color:#7f8c8d;" id="meetingCount">۰ جلسه</span>
        </div>

        <div id="meetingsContainer" class="meetings-list">
            <div class="empty-state">
                <div>⏳</div>
                <p>در حال اتصال به سرور...</p>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let meetings = [];
        let isConnected = false;
        let editingIndex = null;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                isConnected = true;
                document.getElementById('statusDot').className = 'status-dot online';
                document.getElementById('statusText').textContent = 'متصل';
                console.log('✅ به سرور متصل شد!');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'init' || data.type === 'update') {
                        meetings = data.data;
                        renderMeetings();
                    }
                } catch (e) {
                    console.error('خطا:', e);
                }
            };

            ws.onclose = () => {
                isConnected = false;
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').textContent = 'قطع شده';
                console.log('❌ ارتباط قطع شد!');
                setTimeout(connectWebSocket, 3000);
            };
        }

        function sendToServer(type, data) {
            if (!isConnected) {
                alert('❗ اتصال به سرور برقرار نیست. صفحه را Refresh کنید.');
                return false;
            }
            try {
                ws.send(JSON.stringify({ type, ...data }));
                return true;
            } catch (e) {
                console.error('خطا:', e);
                return false;
            }
        }

        function renderMeetings() {
            const container = document.getElementById('meetingsContainer');
            const countEl = document.getElementById('meetingCount');

            countEl.textContent = `${meetings.length} جلسه`;

            if (meetings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div>📭</div>
                        <p>هنوز جلسه‌ای ثبت نشده است.</p>
                        <p style="font-size:13px;">اولین جلسه را ثبت کنید.</p>
                    </div>
                `;
                return;
            }

            const sorted = [...meetings].map((m, i) => ({ ...m, index: i }))
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = sorted.map((meeting) => {
                const dateObj = new Date(meeting.date);
                const formattedDate = dateObj.toLocaleDateString('fa-IR', {
                    year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });

                const attendeesList = meeting.attendees ? 
                    meeting.attendees.split(',').map(a => a.trim()).filter(a => a) : [];

                const isEditing = editingIndex === meeting.index;

                return `
                    <div class="meeting-card ${isEditing ? 'editing' : ''}">
                        <div class="view-mode">
                            <div class="meeting-header">
                                <span class="meeting-title">${escapeHtml(meeting.title)}</span>
                                <span class="meeting-date">${formattedDate}</span>
                            </div>
                            <div class="meeting-meta">
                                <span>📍 ${escapeHtml(meeting.location || 'نامشخص')}</span>
                                <span class="badge">${attendeesList.length} نفر</span>
                            </div>
                            <div class="meeting-summary">${escapeHtml(meeting.summary)}</div>
                            <div class="meeting-footer">
                                <div class="meeting-attendees">
                                    <strong>👥 حاضر:</strong> 
                                    ${attendeesList.length > 0 ? attendeesList.join('، ') : 'هیچ‌کس'}
                                </div>
                                <div class="btn-group">
                                    <button class="btn btn-warning" onclick="startEdit(${meeting.index})" style="padding:6px 14px;font-size:12px;">
                                        ✏️ ویرایش
                                    </button>
                                    <button class="btn btn-danger" onclick="deleteMeeting(${meeting.index})">
                                        🗑️
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="edit-mode">
                            <input class="edit-input" id="edit_title_${meeting.index}" value="${escapeHtml(meeting.title)}" placeholder="موضوع">
                            <input class="edit-input" type="datetime-local" id="edit_date_${meeting.index}" value="${meeting.date}">
                            <textarea class="edit-textarea" id="edit_summary_${meeting.index}" placeholder="خلاصه">${escapeHtml(meeting.summary)}</textarea>
                            <input class="edit-input" id="edit_attendees_${meeting.index}" value="${escapeHtml(meeting.attendees || '')}" placeholder="افراد حاضر">
                            <input class="edit-input" id="edit_location_${meeting.index}" value="${escapeHtml(meeting.location || '')}" placeholder="مکان">
                            <div class="btn-group" style="margin-top:10px;">
                                <button class="btn btn-success" onclick="saveEdit(${meeting.index})" style="padding:6px 20px;font-size:13px;">
                                    ✅ ذخیره
                                </button>
                                <button class="btn" onclick="cancelEdit()" style="padding:6px 20px;font-size:13px;background:#ecf0f1;color:#2c3e50;">
                                    ❌ انصراف
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // به‌روزرسانی تعداد کاربران آنلاین
            document.getElementById('onlineUsers').textContent = `👥 ${Math.floor(Math.random() * 3) + 1} کاربر آنلاین`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('meetingForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const date = document.getElementById('date').value;
            const summary = document.getElementById('summary').value.trim();
            const attendees = document.getElementById('attendees').value.trim();
            const location = document.getElementById('location').value.trim();

            if (!title || !date || !summary) {
                alert('لطفاً عنوان، تاریخ و خلاصه را وارد کنید.');
                return;
            }

            const newMeeting = {
                title,
                date,
                summary,
                attendees: attendees || '',
                location: location || 'جلسه حضوری',
                createdAt: new Date().toISOString()
            };

            if (sendToServer('add', { meeting: newMeeting })) {
                document.getElementById('meetingForm').reset();
                document.getElementById('location').value = '';
                showToast('✅ جلسه با موفقیت ثبت شد!');
            }
        });

        function deleteMeeting(index) {
            if (!confirm('آیا از حذف این جلسه مطمئن هستید؟')) return;
            if (sendToServer('delete', { index })) {
                showToast('🗑️ جلسه حذف شد');
            }
        }

        function startEdit(index) {
            editingIndex = index;
            renderMeetings();
        }

        function saveEdit(index) {
            const title = document.getElementById(`edit_title_${index}`).value.trim();
            const date = document.getElementById(`edit_date_${index}`).value;
            const summary = document.getElementById(`edit_summary_${index}`).value.trim();
            const attendees = document.getElementById(`edit_attendees_${index}`).value.trim();
            const location = document.getElementById(`edit_location_${index}`).value.trim();

            if (!title || !date || !summary) {
                alert('لطفاً همه فیلدهای ضروری را پر کنید.');
                return;
            }

            const editedMeeting = {
                title,
                date,
                summary,
                attendees: attendees || '',
                location: location || 'جلسه حضوری',
                createdAt: meetings[index]?.createdAt || new Date().toISOString()
            };

            if (sendToServer('edit', { index, meeting: editedMeeting })) {
                editingIndex = null;
                showToast('✅ جلسه با موفقیت ویرایش شد!');
            }
        }

        function cancelEdit() {
            editingIndex = null;
            renderMeetings();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: #2c3e50;
                color: white;
                padding: 15px 30px;
                border-radius: 12px;
                font-size: 15px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                z-index: 1000;
                opacity: 0;
                transition: opacity 0.4s ease;
                font-family: 'Segoe UI', sans-serif;
            `;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '1'; }, 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => { toast.remove(); }, 400);
            }, 3000);
        }

        // شروع
        document.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            document.getElementById('date').value = now.toISOString().slice(0, 16);
            connectWebSocket();
        });

        window.deleteMeeting = deleteMeeting;
        window.startEdit = startEdit;
        window.saveEdit = saveEdit;
        window.cancelEdit = cancelEdit;
    </script>
</body>
</html>
